<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>403 — Restricted</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-blob b3"></div>
  <div class="grain"></div>

  <main class="main">
    <div class="lock-wrap">
      <div class="lock-ring r3"></div>
      <div class="lock-ring r2"></div>
      <div class="lock-ring r1"></div>
      <div class="lock-icon-bg">
        <svg viewBox="0 0 44 52" fill="none" width="28" height="34">
          <rect x="3" y="22" width="38" height="27" rx="7" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.5" stroke-width="1.5"/>
          <path d="M12 22V16.5C12 10.7 16.5 6 22 6C27.5 6 32 10.7 32 16.5V22" stroke="white" stroke-opacity="0.6" stroke-width="2" stroke-linecap="round"/>
          <circle cx="22" cy="35" r="3.5" fill="white" fill-opacity="0.7"/>
          <rect x="20.3" y="36.5" width="3.4" height="5" rx="1.5" fill="white" fill-opacity="0.7"/>
        </svg>
      </div>
    </div>

    <div class="content">
      <div class="eyebrow">RESTRICTED ACCESS</div>
      <h1 class="title">Access<br><span class="title-em">Denied.</span></h1>
      <p class="subtitle">You don't have permission to view this resource.<br>Authorized systems only.</p>

      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="statusText">Access denied — logging request</span>
      </div>

      <div class="info-row">
        <div class="info-item">
          <div class="info-label">STATUS</div>
          <div class="info-val red">403 FORBIDDEN</div>
        </div>
        <div class="info-divider"></div>
        <div class="info-item">
          <div class="info-label">PROTOCOL</div>
          <div class="info-val">AMBRION/2.0</div>
        </div>
        <div class="info-divider"></div>
        <div class="info-item">
          <div class="info-label">ENDPOINT</div>
          <div class="info-val">/myscript</div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
